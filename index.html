<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR Flying Face Filter</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #000; 
    }
    /* Make the canvas fill the mobile screen */
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      object-fit: cover; 
      transform: scaleX(-1); /* Mirrors the camera naturally */
    }
    .hidden { 
      display: none; 
    }
  </style>
</head>
<body>

  <video id="input_video" class="hidden" autoplay playsinline></video>
  
  <video id="bg_video" class="hidden" loop autoplay muted playsinline>
    <source src="flying.mp4" type="video/mp4">
  </video>
  
  <canvas id="output_canvas"></canvas>

  <script>
    const videoElement = document.getElementById('input_video');
    const bgVideo = document.getElementById('bg_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // Force background video to play on mobile
    bgVideo.play();

    // These indices form a perfect loop around the outer edge of the face in MediaPipe
    const FACE_OVAL_INDICES = [
      10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 
      148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109
    ];

    function onResults(results) {
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // 1. Draw the flying background video FIRST
      canvasCtx.drawImage(bgVideo, 0, 0, canvasElement.width, canvasElement.height);

      // 2. If a face is detected, cut out just the face and draw it over the background
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        // Create a clipping path using the face oval points
        canvasCtx.beginPath();
        for (let i = 0; i < FACE_OVAL_INDICES.length; i++) {
          const index = FACE_OVAL_INDICES[i];
          const point = landmarks[index];
          // Scale normalized coordinates to canvas dimensions
          const x = point.x * canvasElement.width;
          const y = point.y * canvasElement.height;
          
          if (i === 0) {
            canvasCtx.moveTo(x, y);
          } else {
            canvasCtx.lineTo(x, y);
          }
        }
        canvasCtx.closePath();
        
        // Apply the clipping mask
        canvasCtx.clip();

        // Draw the webcam feed (but because of the clip, ONLY the face oval will be drawn)
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      }

      canvasCtx.restore();
    }

    // Initialize MediaPipe Face Mesh instead of Selfie Segmentation
    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1, // Only track one face for performance
      refineLandmarks: false, // Set to false to boost mobile performance
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    
    faceMesh.onResults(onResults);

    // Initialize the Camera
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720,
      facingMode: "user"
    });
    
    camera.start();
  </script>
</body>
</html>
