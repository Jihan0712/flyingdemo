<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, maximum-scale=1.0">
  <title>Floating Face Filter</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; }
    canvas#mainCanvas { position: absolute; top: 0; left: 0; }
    #start-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.8);
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
      display: none;
    }
    #error {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: #ef4444;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Background Video Placeholder -->
  <video id="bg-video" autoplay muted loop playsinline style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
    <source src="flying.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- AR Container -->
  <div id="face-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;"></div>

  <!-- UI Elements -->
  <button id="start-btn">Tap to Start</button>
  <span id="error">Enable camera for AR</span>
  <canvas id="mainCanvas"></canvas>

  <!-- Third-party Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/mindar-face@1.1.5/dist/mindar-face.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>

  <!-- Application Script -->
  <script>
    // DOM Elements
    const startBtn = document.getElementById('start-btn');
    const errorEl = document.getElementById('error');
    const faceContainer = document.getElementById('face-container');
    const canvas = document.getElementById('mainCanvas');
    const context = canvas.getContext('2d');

    // Request permission on load
    document.addEventListener('DOMContentLoaded', () => {
      startBtn.style.display = 'block';

      startBtn.addEventListener('click', async () => {
        errorEl.style.display = 'none';
        try {
          await startAR(); // start face tracking and render loop
        } catch (e) {
          console.error('Failed to start AR:', e);
          errorEl.textContent = 'AR init failed';
          errorEl.style.display = 'block';
        }
      });

      // Initialize WebGL render context
      if (navigator.gpu) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.display = 'block';
        context.fillStyle = '#000000';
        context.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        errorEl.style.display = 'block';
      }
    });

    // Three.js Setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.z = 50;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    // Insert the WebGL canvas into the AR container so it appears over the video
    faceContainer.appendChild(renderer.domElement);

    const clock = new THREE.Clock();
    const facePose = { position: [0, 0, 0] };
    let trackingActive = false;
    const emojiGroup = new THREE.Group();
    scene.add(emojiGroup);

    // Add initial emojis
    addEmoji('sparkles', 0.5);
    addEmoji('star', 0.7);

    function addEmoji(name, radius = 0.5) {
      const texture = new THREE.TextureLoader().load(`emojis/${name}.png`);
      const material = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        depthWrite: false
      });
      const geometry = new THREE.PlaneGeometry(1, 1);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(new THREE.Vector3(0, 0, radius));
      emojiGroup.add(mesh);
    }

    // Animation logic
    function animate() {
      requestAnimationFrame(animate);
      // Update MindAR internal state and feed its camera texture to Three.js
      mindar.render(renderer);

      if (trackingActive && facePose.position) {
        updateOrbit(facePose.position);
      }
      // Render the Three.js scene (emoji group)
      renderer.render(scene, camera);
    }

    // Orbit update with spring physics
    function updateOrbit(targetPos) {
      const children = emojiGroup.children;
      for (const emoji of children) {
        const dx = targetPos[0] - emoji.position[0];
        const dy = targetPos[1] - emoji.position[1];
        const distance = Math.sqrt(dx*dx + dy*dy);

        const stability = 0.15;
        const newX = emoji.position[0] + (dx / 100) * stability;
        const newY = emoji.position[1] + (dy / 100) * stability;

        emoji.position.set(
          targetPos[0] + Math.cos(clock.getElapsedTime()) * 0.5 + newX,
          targetPos[1] + Math.sin(clock.getElapsedTime()) * 0.5 + newY,
          5
        );
      }
    }

    // Add event listeners
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Declare mindar variable (will be initialized after renderer is ready)
    let mindar;
    // Initialize MindAR now that renderer and container exist
    mindar = new MindAR.Face({
      container: faceContainer,
      uiStart: startBtn,
      maxTrackQueueSize: 5,
      mirror: false,
      uiError: errorEl
    });
    // Attach Three.js renderer to MindAR so it can render the camera feed
    mindar.attachRenderer(renderer);

    mindar.on('-track', (pose) => {
      facePose.position = pose.position;
      trackingActive = true;
    });

    mindar.on('-track-lost', () => {
      trackingActive = false;
    });

    // Helper to start AR and animation loop
    async function startAR() {
      await mindar.start();
      animate();
    }

    // No extra click listener needed – the button handler calls startAR().

    // Remove global function declaration – not needed
    // function initAR() {}

  </script>
</body>
</html>
