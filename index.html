<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR Character Face Swap</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #000; 
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      object-fit: cover; 
      transform: scaleX(-1);
    }
    .hidden { 
      display: none; 
    }
  </style>
</head>
<body>

  <video id="input_video" class="hidden" autoplay playsinline></video>
  
  <video id="bg_video" class="hidden" loop autoplay muted playsinline>
    <source src="TUNGTUNG2.mp4" type="video/mp4">
  </video>
  
  <canvas id="output_canvas"></canvas>

  <script>
    const videoElement = document.getElementById('input_video');
    const bgVideo = document.getElementById('bg_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    bgVideo.play();

    // --- ADJUST THESE TO FIT THE COFFEE CUP PERFECTLY ---
    const TARGET_X_PERCENT = 0.50;    // 0.50 = center of screen horizontally
    const TARGET_Y_PERCENT = 0.55;    // 0.55 = slightly below center vertically (where the cup is)
    const TARGET_SIZE_PERCENT = 0.35; // Face takes up 35% of the screen width

    function onResults(results) {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // 1. Draw the coffee cup background video
      // Calculate drawing dimensions to "cover" the canvas like CSS object-fit: cover
      const bgRatio = bgVideo.videoWidth / bgVideo.videoHeight;
      const canvasRatio = canvasElement.width / canvasElement.height;
      let drawWidth, drawHeight, startX, startY;

      if (bgRatio > canvasRatio) {
        drawHeight = canvasElement.height;
        drawWidth = canvasElement.height * bgRatio;
        startX = (canvasElement.width - drawWidth) / 2;
        startY = 0;
      } else {
        drawWidth = canvasElement.width;
        drawHeight = canvasElement.width / bgRatio;
        startX = 0;
        startY = (canvasElement.height - drawHeight) / 2;
      }
      canvasCtx.drawImage(bgVideo, startX, startY, drawWidth, drawHeight);

      // 2. Process face tracking
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        // Find your face bounding box in the webcam
        let minX = 1, minY = 1, maxX = 0, maxY = 0;
        for (const point of landmarks) {
          if (point.x < minX) minX = point.x;
          if (point.x > maxX) maxX = point.x;
          if (point.y < minY) minY = point.y;
          if (point.y > maxY) maxY = point.y;
        }

        // Calculate your real face size and center in the webcam feed
        const faceWidth = (maxX - minX) * videoElement.videoWidth;
        const faceHeight = (maxY - minY) * videoElement.videoHeight;
        const faceCenterX = ((minX + maxX) / 2) * videoElement.videoWidth;
        const faceCenterY = ((minY + maxY) / 2) * videoElement.videoHeight;

        // Calculate where the face should be drawn over the coffee cup
        const targetX = canvasElement.width * TARGET_X_PERCENT;
        const targetY = canvasElement.height * TARGET_Y_PERCENT;
        const targetWidth = canvasElement.width * TARGET_SIZE_PERCENT;
        const targetHeight = targetWidth * (faceHeight / faceWidth);

        // Figure out how much to shrink/grow your webcam feed to fit the cup
        const scale = targetWidth / faceWidth;

        // 3. Create the clipping mask at the COFFEE CUP location
        canvasCtx.beginPath();
        canvasCtx.ellipse(
          targetX, 
          targetY, 
          targetWidth * 0.6,  // Cutout width
          targetHeight * 0.7, // Cutout height
          0, 0, 2 * Math.PI
        );
        canvasCtx.closePath();
        canvasCtx.clip();

        // 4. Shift, Scale, and Draw the webcam video!
        // This math guarantees your face always lands exactly inside the mask above
        canvasCtx.translate(targetX, targetY);
        canvasCtx.scale(scale, scale);
        canvasCtx.translate(-faceCenterX, -faceCenterY);
        
        canvasCtx.drawImage(results.image, 0, 0, videoElement.videoWidth, videoElement.videoHeight);
      }

      canvasCtx.restore();
    }

    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720,
      facingMode: "user"
    });
    
    camera.start();
  </script>
</body>
</html>
