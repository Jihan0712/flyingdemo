<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR Stabilized Face Tracker</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #000; 
    }
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      object-fit: cover; 
    }
    .hidden { 
      display: none; 
    }
  </style>
</head>
<body>

  <video id="input_video" class="hidden" autoplay playsinline></video>
  <video id="bg_video" class="hidden" loop autoplay muted playsinline>
    <source src="TUNGTUNG2.mp4" type="video/mp4">
  </video>
  
  <canvas id="output_canvas"></canvas>

  <script>
    const videoElement = document.getElementById('input_video');
    const bgVideo = document.getElementById('bg_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    // --- SMOOTHING VARIABLES ---
    // Lower number = smoother but lags behind. Higher number = faster but more jitter.
    const CUP_SMOOTHING = 0.10;  // Heavy smoothing for the cartoon cup
    const USER_SMOOTHING = 0.30; // Lighter smoothing for your webcam face

    // AI's raw guesses
    let rawCup = { x: 0.50, y: 0.52, size: 0.35 }; 
    // The actual smoothed coordinates drawn on screen
    let smoothCup = { x: 0.50, y: 0.52, size: 0.35 }; 

    let smoothUser = { cx: null, cy: null, w: null };

    // ---------------------------------------------------------
    // SYSTEM 1: BACKGROUND VIDEO TRACKER
    // ---------------------------------------------------------
    const bgFaceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    bgFaceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 });

    bgFaceMesh.onResults((results) => {
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        let minX = 1, minY = 1, maxX = 0, maxY = 0;
        for (const pt of landmarks) {
          if (pt.x < minX) minX = pt.x;
          if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y;
          if (pt.y > maxY) maxY = pt.y;
        }
        // Instantly update the raw guess
        rawCup.x = (minX + maxX) / 2;
        rawCup.y = (minY + maxY) / 2;
        rawCup.size = (maxX - minX);
      }
    });

    let isTrackingVideo = false;
    async function processVideoFrame() {
      if (!bgVideo.paused && !bgVideo.ended) {
        await bgFaceMesh.send({image: bgVideo});
        requestAnimationFrame(processVideoFrame);
      } else {
        isTrackingVideo = false;
      }
    }
    
    bgVideo.addEventListener('play', () => {
      if (!isTrackingVideo) {
        isTrackingVideo = true;
        processVideoFrame();
      }
    });
    bgVideo.play();


    // ---------------------------------------------------------
    // SYSTEM 2: WEBCAM TRACKER
    // ---------------------------------------------------------
    const FACE_OVAL_INDICES = [
      10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 
      148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109
    ];

    const webcamFaceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    webcamFaceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    webcamFaceMesh.onResults((results) => {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // 1. Draw Background Video
      const bgRatio = bgVideo.videoWidth / bgVideo.videoHeight;
      const canvasRatio = canvasElement.width / canvasElement.height;
      let drawWidth, drawHeight, startX, startY;

      if (bgRatio > canvasRatio) {
        drawHeight = canvasElement.height;
        drawWidth = canvasElement.height * bgRatio;
        startX = (canvasElement.width - drawWidth) / 2;
        startY = 0;
      } else {
        drawWidth = canvasElement.width;
        drawHeight = canvasElement.width / bgRatio;
        startX = 0;
        startY = (canvasElement.height - drawHeight) / 2;
      }
      canvasCtx.drawImage(bgVideo, startX, startY, drawWidth, drawHeight);

      // APPLY SHOCK ABSORBERS (Smoothing Math)
      smoothCup.x += (rawCup.x - smoothCup.x) * CUP_SMOOTHING;
      smoothCup.y += (rawCup.y - smoothCup.y) * CUP_SMOOTHING;
      smoothCup.size += (rawCup.size - smoothCup.size) * CUP_SMOOTHING;

      // 2. Process Webcam Face
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        let minX = 1, minY = 1, maxX = 0, maxY = 0;
        for (const point of landmarks) {
          if (point.x < minX) minX = point.x;
          if (point.x > maxX) maxX = point.x;
          if (point.y < minY) minY = point.y;
          if (point.y > maxY) maxY = point.y;
        }

        const vidW = videoElement.videoWidth;
        const vidH = videoElement.videoHeight;
        
        const rawUserW = (maxX - minX) * vidW;
        const rawUserCX = ((minX + maxX) / 2) * vidW;
        const rawUserCY = ((minY + maxY) / 2) * vidH;

        // Initialize user smoothing on first frame
        if (smoothUser.cx === null) {
          smoothUser.cx = rawUserCX;
          smoothUser.cy = rawUserCY;
          smoothUser.w = rawUserW;
        }

        // Apply smoothing to your own face tracking
        smoothUser.cx += (rawUserCX - smoothUser.cx) * USER_SMOOTHING;
        smoothUser.cy += (rawUserCY - smoothUser.cy) * USER_SMOOTHING;
        smoothUser.w += (rawUserW - smoothUser.w) * USER_SMOOTHING;

        // Apply Target Coordinates from the SMOOTHED values
        const targetX = startX + (drawWidth * smoothCup.x);
        const targetY = startY + (drawHeight * smoothCup.y);
        const targetWidth = drawWidth * smoothCup.size;
        const scale = targetWidth / smoothUser.w;

        canvasCtx.save();
        
        // Translate to the target location
        canvasCtx.translate(targetX, targetY);
        // Apply mirror effect strictly to the face (-scale)
        canvasCtx.scale(-scale, scale);
        canvasCtx.translate(-smoothUser.cx, -smoothUser.cy);

        // Trace and clip the face oval
        canvasCtx.beginPath();
        for (let i = 0; i < FACE_OVAL_INDICES.length; i++) {
          const index = FACE_OVAL_INDICES[i];
          const point = landmarks[index];
          const x = point.x * vidW;
          const y = point.y * vidH;
          if (i === 0) canvasCtx.moveTo(x, y);
          else canvasCtx.lineTo(x, y);
        }
        canvasCtx.closePath();
        canvasCtx.clip();

        // Draw webcam feed
        canvasCtx.drawImage(results.image, 0, 0, vidW, vidH);
        canvasCtx.restore();
      }
      canvasCtx.restore();
    });

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await webcamFaceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720,
      facingMode: "user"
    });
    camera.start();
  </script>
</body>
</html>
