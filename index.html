<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Top Cafe AR - Capture & Record</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #000; 
      font-family: sans-serif;
      touch-action: none; /* Prevents pull-to-refresh on mobile */
    }
    
    canvas { 
      display: block; 
      width: 100vw; 
      height: 100vh; 
      object-fit: cover; 
    }
    
    .hidden { 
      display: none !important; 
    }

    /* Screen Flash Effect for Photos */
    #flash {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease-out;
      z-index: 50;
    }

    /* Capture Button UI */
    #capture-btn-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #capture-btn {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.4);
      border: 4px solid white;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #capture-inner {
      width: 50px;
      height: 50px;
      background: white;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    /* Animation state when holding to record */
    #capture-btn.recording {
      border-color: #ff3b30;
      transform: scale(1.1);
    }
    #capture-btn.recording #capture-inner {
      background: #ff3b30;
      border-radius: 10px; /* Turns into a square stop button */
      width: 30px;
      height: 30px;
    }

    .hint-text {
      color: white;
      font-size: 12px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      font-weight: bold;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <video id="input_video" class="hidden" autoplay playsinline webkit-playsinline></video>
  <video id="bg_video" class="hidden" loop muted autoplay playsinline webkit-playsinline>
    <source src="TUNGTUNG2.mp4" type="video/mp4">
  </video>
  <img id="headline-img" class="hidden" src="headline.jpg" crossorigin="anonymous">
  <img id="logo-img" class="hidden" src="top-cafe-logo.png" crossorigin="anonymous">

  <div id="flash"></div>
  <canvas id="output_canvas"></canvas>

  <div id="capture-btn-container">
    <div id="capture-btn">
      <div id="capture-inner"></div>
    </div>
    <div class="hint-text">Tap for Photo • Hold for Video</div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const bgVideo = document.getElementById('bg_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d', { willReadFrequently: true });
    
    // Graphic Assets
    const headlineImg = document.getElementById('headline-img');
    const logoImg = document.getElementById('logo-img');

    // UI Elements
    const captureBtn = document.getElementById('capture-btn');
    const flash = document.getElementById('flash');

    const CUP_SMOOTHING = 0.10; 
    const USER_SMOOTHING = 0.30; 
    let rawCup = { x: 0.50, y: 0.52, size: 0.35 }; 
    let smoothCup = { x: 0.50, y: 0.52, size: 0.35 }; 
    let smoothUser = { cx: null, cy: null, w: null };

    // --- Media Recording Setup ---
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let holdTimeout;

    // Try to find the best video format supported by the user's browser (especially iOS vs Android)
    let mimeType = 'video/webm';
    if (MediaRecorder.isTypeSupported('video/mp4')) {
      mimeType = 'video/mp4'; // Better for iOS Safari
    }

    // Capture the Canvas stream at 30 frames per second
    const canvasStream = canvasElement.captureStream(30);

    function startRecording() {
      recordedChunks = [];
      mediaRecorder = new MediaRecorder(canvasStream, { mimeType: mimeType });
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };
      
      mediaRecorder.onstop = () => {
        // When stopped, package the video and download it automatically
        const blob = new Blob(recordedChunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        // Check if iOS, save as .mp4, otherwise .webm
        a.download = mimeType === 'video/mp4' ? 'TopCafe_AR.mp4' : 'TopCafe_AR.webm';
        document.body.appendChild(a);
        a.click();
        URL.revokeObjectURL(url);
        document.body.removeChild(a);
      };
      
      mediaRecorder.start();
    }

    function takePhoto() {
      // Trigger flash animation
      flash.style.opacity = '1';
      setTimeout(() => { flash.style.opacity = '0'; }, 150);

      // Extract image and download
      const dataUrl = canvasElement.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = 'TopCafe_AR.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // --- Capture Button Events ---
    const handlePress = (e) => {
      e.preventDefault();
      captureBtn.style.transform = 'scale(0.9)';
      
      // If held for 400ms, consider it a video recording
      holdTimeout = setTimeout(() => {
        isRecording = true;
        captureBtn.classList.add('recording');
        startRecording();
      }, 400);
    };

    const handleRelease = (e) => {
      e.preventDefault();
      clearTimeout(holdTimeout); // Cancel the timer
      captureBtn.style.transform = 'scale(1)';

      if (isRecording) {
        // Stop Video
        isRecording = false;
        captureBtn.classList.remove('recording');
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
      } else {
        // It was a quick tap -> Take Photo
        takePhoto();
      }
    };

    // Bind touch and mouse events for universal mobile/desktop support
    captureBtn.addEventListener('pointerdown', handlePress);
    captureBtn.addEventListener('pointerup', handleRelease);
    captureBtn.addEventListener('pointerleave', handleRelease);

    // --- SYSTEM 1: BACKGROUND TRACKER ---
    const bgFaceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    bgFaceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 });

    bgFaceMesh.onResults((results) => {
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        let minX = 1, minY = 1, maxX = 0, maxY = 0;
        for (const pt of landmarks) {
          if (pt.x < minX) minX = pt.x;
          if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y;
          if (pt.y > maxY) maxY = pt.y;
        }
        rawCup.x = (minX + maxX) / 2;
        rawCup.y = (minY + maxY) / 2;
        rawCup.size = (maxX - minX);
      }
    });

    let isTrackingVideo = false;
    async function processVideoFrame() {
      if (!bgVideo.paused && !bgVideo.ended) {
        await bgFaceMesh.send({image: bgVideo});
        requestAnimationFrame(processVideoFrame);
      } else {
        isTrackingVideo = false;
      }
    }
    
    bgVideo.addEventListener('play', () => {
      if (!isTrackingVideo) {
        isTrackingVideo = true;
        processVideoFrame();
      }
    });

    // --- SYSTEM 2: WEBCAM TRACKER & COMPOSITING ---
    const FACE_OVAL_INDICES = [
      10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 
      148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109
    ];

    const webcamFaceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    webcamFaceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    webcamFaceMesh.onResults((results) => {
      canvasElement.width = window.innerWidth;
      canvasElement.height = window.innerHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // 1. Draw Background Video
      const bgRatio = bgVideo.videoWidth / bgVideo.videoHeight;
      const canvasRatio = canvasElement.width / canvasElement.height;
      let drawWidth, drawHeight, startX, startY;

      if (bgRatio > canvasRatio) {
        drawHeight = canvasElement.height;
        drawWidth = canvasElement.height * bgRatio;
        startX = (canvasElement.width - drawWidth) / 2;
        startY = 0;
      } else {
        drawWidth = canvasElement.width;
        drawHeight = canvasElement.width / bgRatio;
        startX = 0;
        startY = (canvasElement.height - drawHeight) / 2;
      }
      canvasCtx.drawImage(bgVideo, startX, startY, drawWidth, drawHeight);

      smoothCup.x += (rawCup.x - smoothCup.x) * CUP_SMOOTHING;
      smoothCup.y += (rawCup.y - smoothCup.y) * CUP_SMOOTHING;
      smoothCup.size += (rawCup.size - smoothCup.size) * CUP_SMOOTHING;

      // 2. Draw User Face Mask
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        let minX = 1, minY = 1, maxX = 0, maxY = 0;
        for (const point of landmarks) {
          if (point.x < minX) minX = point.x;
          if (point.x > maxX) maxX = point.x;
          if (point.y < minY) minY = point.y;
          if (point.y > maxY) maxY = point.y;
        }

        const vidW = videoElement.videoWidth;
        const vidH = videoElement.videoHeight;
        
        const rawUserW = (maxX - minX) * vidW;
        const rawUserCX = ((minX + maxX) / 2) * vidW;
        const rawUserCY = ((minY + maxY) / 2) * vidH;

        if (smoothUser.cx === null) {
          smoothUser.cx = rawUserCX;
          smoothUser.cy = rawUserCY;
          smoothUser.w = rawUserW;
        }

        smoothUser.cx += (rawUserCX - smoothUser.cx) * USER_SMOOTHING;
        smoothUser.cy += (rawUserCY - smoothUser.cy) * USER_SMOOTHING;
        smoothUser.w += (rawUserW - smoothUser.w) * USER_SMOOTHING;

        const targetX = startX + (drawWidth * smoothCup.x);
        const targetY = startY + (drawHeight * smoothCup.y);
        const targetWidth = drawWidth * smoothCup.size;
        const scale = targetWidth / smoothUser.w;

        canvasCtx.save();
        canvasCtx.translate(targetX, targetY);
        canvasCtx.scale(-scale, scale); // Reverses camera to act as mirror
        canvasCtx.translate(-smoothUser.cx, -smoothUser.cy);

        canvasCtx.beginPath();
        for (let i = 0; i < FACE_OVAL_INDICES.length; i++) {
          const index = FACE_OVAL_INDICES[i];
          const point = landmarks[index];
          const x = point.x * vidW;
          const y = point.y * vidH;
          if (i === 0) canvasCtx.moveTo(x, y);
          else canvasCtx.lineTo(x, y);
        }
        canvasCtx.closePath();
        canvasCtx.clip();

        canvasCtx.drawImage(results.image, 0, 0, vidW, vidH);
        canvasCtx.restore();
      }
      
      // 3. Draw Overlays DIRECTLY onto canvas so they save in the photo/video
      // Draw Headline (with screen blend mode)
      if (headlineImg.complete && headlineImg.naturalWidth > 0) {
        canvasCtx.save();
        canvasCtx.globalCompositeOperation = 'screen';
        const hlWidth = canvasElement.width * 0.85; 
        const hlHeight = hlWidth * (headlineImg.naturalHeight / headlineImg.naturalWidth);
        canvasCtx.drawImage(headlineImg, (canvasElement.width - hlWidth) / 2, canvasElement.height * 0.25, hlWidth, hlHeight);
        canvasCtx.restore();
      }

      // Draw Logo
      if (logoImg.complete && logoImg.naturalWidth > 0) {
        canvasCtx.save();
        const lgWidth = canvasElement.width * 0.70; 
        const lgHeight = lgWidth * (logoImg.naturalHeight / logoImg.naturalWidth);
        // Positioned lower down, adjusting based on height to stay off the very edge
        canvasCtx.drawImage(logoImg, (canvasElement.width - lgWidth) / 2, canvasElement.height * 1.05 - lgHeight - 80, lgWidth, lgHeight);
        canvasCtx.restore();
      }

      canvasCtx.restore();
    });

    // --- AUTO-START ---
    // Start camera directly on load
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await webcamFaceMesh.send({image: videoElement});
      },
      width: 1280,
      height: 720,
      facingMode: "user"
    });
    
    // Play background immediately
    bgVideo.play().catch(e => console.log("Auto-play blocked by browser."));
    camera.start().catch(e => console.log("Camera blocked by browser."));

    // Fallback: If iOS Safari strictly blocks the camera/video on load without a user tap, 
    // tapping anywhere on the screen will force it to start.
    document.body.addEventListener('pointerdown', () => {
      if (bgVideo.paused) bgVideo.play();
    }, { once: true });

  </script>
</body>
</html>
